# PipeWatch Configuration Example
# Copy this file to config.yaml and customize for your pipelines

# Logging level: DEBUG, INFO, WARNING, ERROR
log_level: INFO

# Pipeline definitions
pipelines:
  # Example: Check if a Python ETL script runs successfully
  - name: daily_etl_job
    check_command: python /path/to/check_etl_status.py
    check_interval: 300  # Check every 5 minutes (in seconds)
    timeout: 30  # Command timeout in seconds
    enabled: true

  # Example: Check if a database backup completed
  - name: database_backup
    check_command: /scripts/check_backup.sh
    check_interval: 3600  # Check every hour
    timeout: 60
    enabled: true

  # Example: Verify data freshness in a table
  - name: data_freshness_check
    check_command: psql -c "SELECT check_data_freshness();"
    check_interval: 600  # Check every 10 minutes
    timeout: 30
    enabled: false  # Disabled by default

# Slack notifications (optional)
slack:
  enabled: true
  webhook_url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
  channel: "#pipeline-alerts"  # Optional: override webhook default
  username: PipeWatch  # Bot display name

# Email notifications (optional)
email:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: your-email@gmail.com
  smtp_password: your-app-password  # Use environment variable in production!
  from_email: pipewatch-alerts@example.com
  to_emails:
    - devops-team@example.com
    - data-team@example.com

# Note: For production, use environment variables for sensitive data:
# smtp_password: ${SMTP_PASSWORD}
# webhook_url: ${SLACK_WEBHOOK_URL}
