# pipewatch example configuration
# Copy to config.yaml and fill in your values.

slack:
  enabled: true
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

email:
  enabled: false
  smtp_host: "smtp.example.com"
  smtp_port: 587
  username: "alerts@example.com"
  password: "secret"
  from_addr: "alerts@example.com"
  to_addrs:
    - "oncall@example.com"

# Alert rules — evaluated after every check using recent history.
alert_rules:
  - name: single_failure
    consecutive_failures: 1          # fire on first failure
    pipelines: []                    # empty = applies to all pipelines

  - name: repeated_failures
    consecutive_failures: 3          # fire only after 3 failures in a row

  - name: high_failure_rate
    failure_rate_threshold: 0.5      # fire when >=50% of recent checks failed
    consecutive_failures: 99         # effectively disabled for this rule
    pipelines:
      - critical_etl

pipelines:
  - name: daily_sales_etl
    command: "python etl/sales.py"
    schedule_seconds: 3600
    enabled: true
    retry:
      attempts: 3
      delay_seconds: 30
      backoff: 2.0

  - name: critical_etl
    command: "python etl/critical.py"
    schedule_seconds: 900
    enabled: true

  - name: weekly_report
    command: "python reports/weekly.py"
    schedule_seconds: 604800
    enabled: false
